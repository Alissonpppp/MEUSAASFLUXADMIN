<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxBlue - Painel Administrativo</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, getDocs, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

        window.FirebaseSDK = {
            initializeApp,
            auth: { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup },
            firestore: { getFirestore, doc, setDoc, collection, getDocs, updateDoc, deleteDoc }
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { 
                        brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
                        slate: { 850: '#1a2234', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .loader { border: 3px solid #1e293b; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased selection:bg-brand-500 selection:text-white">
    <div id="root"><div class="h-screen flex items-center justify-center"><div class="loader"></div></div></div>

    <script type="text/babel">
        function startAdminApp() {
            const { initializeApp } = window.FirebaseSDK;
            const { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } = window.FirebaseSDK.auth;
            const { getFirestore, doc, setDoc, collection, getDocs, updateDoc, deleteDoc } = window.FirebaseSDK.firestore;

            // MESMA CONFIGURAÇÃO DE BANCO DE DADOS DO APP PRINCIPAL
            const firebaseConfig = {
                apiKey: "AIzaSyB5I6RG-FicgOThwhl-1LLWySo3JRjK1YI",
                authDomain: "bompre-8a7c0.firebaseapp.com",
                projectId: "bompre-8a7c0",
                storageBucket: "bompre-8a7c0.firebasestorage.app",
                messagingSenderId: "390830730249",
                appId: "1:390830730249:web:106a313c6d2bae02ec5cd8"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'fluxblue-prod-v6';
            const { useState, useEffect } = React;

            const AdminLogin = () => {
                const [email, setEmail] = useState(''); 
                const [password, setPassword] = useState('');
                const [error, setError] = useState('');
                const [loading, setLoading] = useState(false);

                const handleLogin = async (e) => {
                    e.preventDefault();
                    setError('');
                    setLoading(true);
                    try { 
                        await signInWithEmailAndPassword(auth, email, password); 
                    } catch (err) { 
                        setError("Acesso negado. Verifique suas credenciais."); 
                        setLoading(false);
                    }
                };

                const handleGoogleLogin = async () => {
                    setError('');
                    setLoading(true);
                    try {
                        await signInWithPopup(auth, new GoogleAuthProvider());
                    } catch (err) {
                        setError("Erro ao autenticar com Google: " + err.message);
                        setLoading(false);
                    }
                };

                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-slate-800 p-8 rounded-3xl max-w-md w-full border border-slate-700 shadow-2xl">
                            <div className="text-center mb-6">
                                <div className="w-12 h-12 bg-brand-500/20 text-brand-500 rounded-2xl flex items-center justify-center font-black text-xl mx-auto mb-3">⚡</div>
                                <h1 className="text-2xl font-extrabold text-white">Painel do Admin</h1>
                                <p className="text-slate-400 text-xs mt-1">Acesso restrito ao gestor do sistema</p>
                            </div>
                            {error && <div className="bg-rose-500/20 border border-rose-500/30 text-rose-300 p-3 rounded-xl mb-4 text-xs font-semibold">{error}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" placeholder="E-mail de Administrador" required className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3.5 text-sm text-white focus:outline-none focus:border-brand-500" value={email} onChange={e=>setEmail(e.target.value)} />
                                <input type="password" placeholder="Senha" required className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3.5 text-sm text-white focus:outline-none focus:border-brand-500" value={password} onChange={e=>setPassword(e.target.value)} />
                                <button disabled={loading} className="w-full bg-brand-600 hover:bg-brand-500 font-bold py-3.5 rounded-xl transition text-sm shadow-lg shadow-brand-600/30">{loading ? 'Acessando...' : 'Acessar Painel'}</button>
                            </form>
                            <div className="relative my-6"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-700"></div></div><div className="relative flex justify-center text-[10px] uppercase"><span className="bg-slate-800 px-3 text-slate-500 font-bold tracking-wider">Ou</span></div></div>
                            <button onClick={handleGoogleLogin} disabled={loading} className="w-full bg-slate-700 hover:bg-slate-600 py-3.5 rounded-xl font-bold text-sm transition flex items-center justify-center gap-2">
                                Entrar com Google
                            </button>
                        </div>
                    </div>
                );
            };

            const DashboardAdmin = ({ user }) => {
                const [users, setUsers] = useState([]);
                const [loading, setLoading] = useState(true);
                const [searchTerm, setSearchTerm] = useState('');

                const fetchUsers = async () => {
                    setLoading(true);
                    try {
                        const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public_users'));
                        const list = querySnapshot.docs.map(d => {
                            const data = d.data();
                            const expires = data.expiresAt ? new Date(data.expiresAt) : new Date(0);
                            const isExpired = new Date() > expires;
                            return { id: d.id, ...data, isExpired };
                        });
                        setUsers(list);
                    } catch (e) {
                        console.error("Erro ao buscar usuários:", e);
                    } finally {
                        setLoading(false);
                    }
                };

                useEffect(() => { fetchUsers(); }, []);

                const toggleStatus = async (uid, active, extend = false) => {
                    try {
                        let updates = { active };
                        if (extend) {
                            const nextMonth = new Date(); 
                            nextMonth.setDate(nextMonth.getDate() + 30);
                            updates.expiresAt = nextMonth.toISOString();
                        } else if (!active) {
                            const yesterday = new Date(); 
                            yesterday.setDate(yesterday.getDate() - 1);
                            updates.expiresAt = yesterday.toISOString();
                        }
                        
                        await updateDoc(doc(db, 'artifacts', appId, 'public_users', uid), updates);
                        await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'data', 'finance'), { 
                            subscription: { active, expiresAt: updates.expiresAt } 
                        }, { merge: true });
                        
                        fetchUsers();
                        alert(active ? 'Assinatura renovada por +30 dias com sucesso!' : 'Acesso revogado!');
                    } catch (e) {
                        alert("Erro ao atualizar status: " + e.message);
                    }
                };

                const deleteUserDoc = async (uid) => {
                    if(!confirm('ATENÇÃO: Excluir este usuário apagará todo o registro financeiro dele no banco de dados. Deseja continuar?')) return;
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public_users', uid));
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', uid, 'data', 'finance'));
                        fetchUsers();
                    } catch (e) {
                        alert("Erro ao excluir usuário: " + e.message);
                    }
                };

                const filteredUsers = users.filter(u => 
                    (u.email && u.email.toLowerCase().includes(searchTerm.toLowerCase())) ||
                    (u.id && u.id.toLowerCase().includes(searchTerm.toLowerCase()))
                );

                return (
                    <div className="max-w-6xl mx-auto p-4 md:p-8">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 pb-6 border-b border-slate-800 gap-4">
                            <div>
                                <h1 className="text-2xl font-extrabold text-white flex items-center gap-2">
                                    <span>Gestão de Clientes</span>
                                    <span className="text-xs bg-brand-500/20 text-brand-400 border border-brand-500/30 px-2.5 py-0.5 rounded-full font-bold">{users.length} total</span>
                                </h1>
                                <p className="text-slate-400 text-xs mt-1">Administrador conectado: <strong className="text-slate-200">{user.email}</strong></p>
                            </div>
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <input 
                                    type="text" 
                                    placeholder="Buscar por e-mail ou ID..." 
                                    className="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 flex-1 md:w-64"
                                    value={searchTerm}
                                    onChange={e=>setSearchTerm(e.target.value)}
                                />
                                <button onClick={()=>signOut(auth)} className="bg-rose-500/10 text-rose-400 border border-rose-500/20 hover:bg-rose-500 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition">Sair</button>
                            </div>
                        </header>

                        {loading ? (
                            <div className="text-center py-20"><div className="loader mx-auto mb-3"></div><p className="text-slate-400 text-xs font-semibold">Carregando base de usuários...</p></div>
                        ) : (
                            <div className="grid gap-3">
                                {filteredUsers.map(u => (
                                    <div key={u.id} className="bg-slate-800/80 p-5 rounded-2xl border border-slate-700/80 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 hover:border-slate-600 transition">
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-3 mb-1">
                                                <span className="font-extrabold text-base text-white truncate">{u.email || 'Usuário sem e-mail'}</span>
                                                {u.isExpired || !u.active ? (
                                                    <span className="bg-rose-500/20 text-rose-400 border border-rose-500/30 text-[10px] px-2 py-0.5 rounded-md font-extrabold uppercase tracking-wider">Vencido / Bloqueado</span>
                                                ) : (
                                                    <span className="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 text-[10px] px-2 py-0.5 rounded-md font-extrabold uppercase tracking-wider">Ativo</span>
                                                )}
                                            </div>
                                            <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-400">
                                                <p className="font-mono text-[11px] select-all cursor-pointer hover:text-slate-300" title="Clique para copiar" onClick={()=>{navigator.clipboard.writeText(u.id); alert('ID copiado!');}}>ID: {u.id}</p>
                                                <span>•</span>
                                                <span>Expira em: <strong className="text-slate-300">{u.expiresAt ? new Date(u.expiresAt).toLocaleDateString('pt-BR') : 'N/A'}</strong></span>
                                            </div>
                                        </div>
                                        <div className="flex flex-wrap items-center gap-2 w-full lg:w-auto">
                                            <button onClick={()=>toggleStatus(u.id, true, true)} className="flex-1 lg:flex-none bg-emerald-600 hover:bg-emerald-500 text-white px-3.5 py-2 rounded-xl text-xs font-bold transition shadow-md shadow-emerald-600/20">
                                                +30 Dias (Aprovar)
                                            </button>
                                            <button onClick={()=>toggleStatus(u.id, false, false)} className="flex-1 lg:flex-none bg-amber-600 hover:bg-amber-500 text-white px-3.5 py-2 rounded-xl text-xs font-bold transition">
                                                Bloquear Acesso
                                            </button>
                                            <button onClick={()=>deleteUserDoc(u.id)} className="bg-rose-500/10 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-500/20 px-3.5 py-2 rounded-xl text-xs font-bold transition flex items-center justify-center" title="Excluir Usuário">
                                                Excluir
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                {filteredUsers.length === 0 && (
                                    <div className="text-center py-16 bg-slate-800/40 rounded-3xl border border-slate-800 text-slate-500 text-xs">
                                        Nenhum usuário encontrado na busca.
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            const Root = () => {
                const [user, setUser] = useState(null); 
                const [loading, setLoading] = useState(true);

                useEffect(() => {
                    return onAuthStateChanged(auth, (u) => {
                        // SEGURANÇA: Só permite entrar se o e-mail for exatamente o seu
                        if (u && u.email === "salatielvitorino45@gmail.com") {
                            setUser(u);
                        } else if (u) {
                            alert("Acesso negado! Este e-mail (" + u.email + ") não possui permissões de administrador do sistema.");
                            signOut(auth);
                            setUser(null);
                        } else {
                            setUser(null);
                        }
                        setLoading(false);
                    });
                }, []);

                if (loading) return <div className="h-screen flex items-center justify-center"><div className="loader"></div></div>;
                return user ? <DashboardAdmin user={user} /> : <AdminLogin />;
            };

            ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
        }

        if (window.FirebaseSDK) startAdminApp(); else window.addEventListener('firebase-ready', startAdminApp);
    </script>
</body>
</html>
